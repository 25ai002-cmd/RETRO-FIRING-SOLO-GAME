<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Spec-Ops: Tactical Mobile</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Courier New', monospace; cursor: crosshair; touch-action: none; }
        .overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: rgba(0, 15, 0, 0.98); z-index: 100; color: #00ff41; text-align: center;
        }
        #hud {
            position: absolute; top: 20px; left: 20px; right: 20px;
            color: #00ff41; pointer-events: none; z-index: 10;
            display: none; justify-content: space-between;
        }
        .pause-btn {
            pointer-events: auto; background: rgba(0, 255, 65, 0.2);
            border: 1px solid #00ff41; color: #00ff41; padding: 8px 15px;
            cursor: pointer; font-family: 'Courier New', monospace; font-size: 14px;
        }
        .input-group { margin: 15px 0; }
        input[type="text"] {
            background: rgba(0, 255, 65, 0.1); border: 2px solid #00ff41;
            color: #00ff41; padding: 10px; font-family: 'Courier New', monospace;
            font-size: 18px; text-align: center; outline: none; width: 200px;
        }
        .btn {
            background: none; border: 2px solid #00ff41; color: #00ff41;
            padding: 15px 30px; font-size: 20px; cursor: pointer;
            font-family: 'Courier New', monospace; font-weight: bold; margin-top: 15px;
        }
        #scanlines {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%);
            background-size: 100% 4px; z-index: 200; pointer-events: none;
        }
        .history-container {
            margin-top: 20px; padding: 10px; border-top: 1px solid #00ff41;
            width: 80%; max-width: 300px; font-size: 14px;
        }
        .history-item {
            display: flex; justify-content: space-between; margin: 5px 0;
            opacity: 0.8;
        }
    </style>
</head>
<body oncontextmenu="return false;">

    <div id="scanlines"></div>

    <div id="start-interface" class="overlay">
        <h1>SPEC-OPS: MOBILE</h1>
        <div class="input-group">
            <input type="text" id="username" placeholder="OPERATIVE ID" maxlength="12">
        </div>
        <button class="btn" onclick="startGame()">INITIALIZE</button>
    </div>

    <div id="hud">
        <div>
            ID: <span id="id-display"></span><br>
            LIVES: <span id="lives-display">❤️❤️❤️</span><br>
            INTEL: <span id="score-display">00000</span>
        </div>
        <button class="pause-btn" id="p-btn" onclick="togglePause()">PAUSE</button>
    </div>

    <div id="death-interface" class="overlay" style="display: none;">
        <h1 style="color: #ff4444;">MISSION FAILED</h1>
        <div id="rank-title" style="color:#ffcc00; margin-bottom: 10px;"></div>
        <p id="final-stats"></p>
        
        <div class="history-container">
            <div style="margin-bottom: 10px; text-decoration: underline;">RECENT MISSIONS</div>
            <div id="history-list"></div>
        </div>

        <button class="btn" onclick="location.reload()">REDEPLOY</button>
    </div>

<script>
let gameActive = false, score = 0, lives = 3, threatLevel = 1;
let player, gun, enemies, bullets, keys, audioCtx;
let joystickBase, joystickThumb, joystickActive = false;
let fireButton, isFiring = false;

const config = {
    type: Phaser.AUTO,
    width: window.innerWidth,
    height: window.innerHeight,
    physics: { 
        default: 'arcade',
        arcade: {
            fps: 60,
            forceLowPriority: true 
        }
    },
    scene: { preload, create, update }
};

const phaserGame = new Phaser.Game(config);

function playSound(type) {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if (audioCtx.state === 'suspended') audioCtx.resume();

    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain); 
    gain.connect(audioCtx.destination);
    
    const now = audioCtx.currentTime;
    if (type === 'fire') {
        osc.frequency.setValueAtTime(800, now);
        osc.frequency.exponentialRampToValueAtTime(100, now + 0.1);
        gain.gain.setValueAtTime(0.04, now);
        gain.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
        osc.start(now); osc.stop(now + 0.1);
    } else {
        osc.type = 'sawtooth';
        osc.frequency.setValueAtTime(100, now);
        gain.gain.setValueAtTime(0.1, now);
        gain.gain.linearRampToValueAtTime(0, now + 0.2);
        osc.start(now); osc.stop(now + 0.2);
    }
}

function preload() {
    let g = this.make.graphics({ x: 0, y: 0, add: false });
    g.lineStyle(1, 0x00ff41, 0.2).strokeRect(0, 0, 64, 64);
    g.generateTexture('grid', 64, 64);
    g.clear().fillStyle(0x00ff41).fillRect(0, 0, 20, 20);
    g.generateTexture('p', 20, 20);
    g.clear().fillStyle(0x00ff41).fillRect(0, 0, 18, 6);
    g.generateTexture('g', 18, 6);
    g.clear().fillStyle(0xff4444).fillRect(0, 0, 22, 22);
    g.generateTexture('e', 22, 22);
    g.clear().fillStyle(0xffff00).fillRect(0, 0, 12, 3);
    g.generateTexture('b', 12, 3);
    
    g.clear().lineStyle(2, 0x00ff41, 0.4).strokeCircle(50, 50, 50);
    g.generateTexture('jBase', 100, 100);
    g.clear().fillStyle(0x00ff41, 0.4).fillCircle(25, 25, 25);
    g.generateTexture('jThumb', 50, 50);
    g.clear().lineStyle(3, 0x00ff41, 0.6).strokeCircle(40, 40, 40);
    g.fillStyle(0x00ff41, 0.2).fillCircle(40, 40, 40);
    g.generateTexture('fireBtn', 80, 80);
}

function create() {
    this.add.tileSprite(0,0,5000,5000,'grid').setOrigin(0);
    player = this.physics.add.sprite(window.innerWidth/2, window.innerHeight/2, 'p').setVisible(false);
    player.setDamping(true).setDrag(0.05).setMaxVelocity(400).setCollideWorldBounds(true);
    
    gun = this.add.image(0,0,'g').setOrigin(0, 0.5).setVisible(false);
    bullets = this.physics.add.group({ defaultKey: 'b', maxSize: 50 });
    enemies = this.physics.add.group();
    keys = this.input.keyboard.addKeys('W,A,S,D');

    joystickBase = this.add.image(0, 0, 'jBase').setVisible(false).setDepth(100);
    joystickThumb = this.add.image(0, 0, 'jThumb').setVisible(false).setDepth(101);
    
    fireButton = this.add.image(window.innerWidth - 80, window.innerHeight - 80, 'fireBtn')
        .setInteractive().setVisible(false).setDepth(100).setScrollFactor(0);

    this.input.addPointer(2);

    this.input.on('pointerdown', (pointer) => {
        if (pointer.x < window.innerWidth / 2) {
            joystickActive = true;
            joystickBase.setPosition(pointer.x, pointer.y).setVisible(true);
            joystickThumb.setPosition(pointer.x, pointer.y).setVisible(true);
        }
    });

    fireButton.on('pointerdown', () => { isFiring = true; fireButton.setAlpha(0.8); });
    fireButton.on('pointerup', () => { isFiring = false; fireButton.setAlpha(1); });
    fireButton.on('pointerout', () => { isFiring = false; fireButton.setAlpha(1); });

    this.input.on('pointerup', (pointer) => {
        if (pointer.x < window.innerWidth / 2) {
            joystickActive = false;
            joystickBase.setVisible(false);
            joystickThumb.setVisible(false);
            player.setAcceleration(0);
        }
    });

    this.physics.add.overlap(bullets, enemies, (b, e) => {
        bullets.killAndHide(b);
        b.body.stop();
        e.destroy();
        playSound('hit');
        score += 100;
        document.getElementById('score-display').innerText = score.toString().padStart(5, '0');
        if(score % 500 === 0) threatLevel++;
    });

    this.physics.add.collider(player, enemies, (p, e) => {
        e.destroy(); lives--;
        this.cameras.main.shake(200, 0.02);
        document.getElementById('lives-display').innerText = "❤️".repeat(lives) || "KIA";
        if (lives <= 0) endGame();
    });
    this.physics.world.pause();
}

function update(time) {
    if (!gameActive || this.physics.world.isPaused) return;

    if (joystickActive) {
        let pointer = this.input.pointers.find(p => p.isDown && p.x < window.innerWidth / 2);
        if (pointer) {
            const angle = Phaser.Math.Angle.Between(joystickBase.x, joystickBase.y, pointer.x, pointer.y);
            const dist = Phaser.Math.Distance.Between(joystickBase.x, joystickBase.y, pointer.x, pointer.y);
            const moveDist = Math.min(dist, 50);
            joystickThumb.setPosition(joystickBase.x + Math.cos(angle) * moveDist, joystickBase.y + Math.sin(angle) * moveDist);
            player.setAcceleration(Math.cos(angle) * 2000, Math.sin(angle) * 2000);
        }
    } else {
        let accelX = 0, accelY = 0;
        if (keys.W.isDown) accelY = -2000; else if (keys.S.isDown) accelY = 2000;
        if (keys.A.isDown) accelX = -2000; else if (keys.D.isDown) accelX = 2000;
        player.setAcceleration(accelX, accelY);
    }

    let nearest = this.physics.closest(player, enemies.getChildren());
    let targetAngle = player.rotation;
    if (nearest) {
        targetAngle = Phaser.Math.Angle.Between(player.x, player.y, nearest.x, nearest.y);
        player.setRotation(targetAngle);
    }
    gun.setPosition(player.x, player.y).setRotation(targetAngle);

    if ((isFiring || this.input.activePointer.leftButtonDown()) && time > (this.lastFired || 0)) {
        let b = bullets.get(player.x, player.y);
        if (b) {
            b.setActive(true).setVisible(true).body.reset(player.x, player.y);
            b.setRotation(targetAngle);
            this.physics.velocityFromRotation(targetAngle, 1800, b.body.velocity);
            this.lastFired = time + 100;
            playSound('fire');
        }
    }

    bullets.getChildren().forEach(b => {
        if (b.active && (b.x < -50 || b.x > window.innerWidth + 50 || b.y < -50 || b.y > window.innerHeight + 50)) {
            bullets.killAndHide(b);
            b.body.stop();
        }
    });

    if (enemies.countActive() < (5 + threatLevel)) {
        let x = Phaser.Math.Between(0, window.innerWidth), y = Phaser.Math.Between(0, window.innerHeight);
        if (Phaser.Math.Distance.Between(x, y, player.x, player.y) > 300) enemies.create(x, y, 'e');
    }
    enemies.getChildren().forEach(e => this.physics.moveToObject(e, player, 140 + (threatLevel * 10)));
}

function startGame() {
    const nameInput = document.getElementById('username').value.trim();
    const name = (nameInput || "OPERATIVE").toUpperCase();
    document.getElementById('id-display').innerText = name;
    gameActive = true;
    document.getElementById('start-interface').style.display = 'none';
    document.getElementById('hud').style.display = 'flex';
    player.setVisible(true); gun.setVisible(true); fireButton.setVisible(true);
    phaserGame.scene.scenes[0].physics.world.resume();
}

function togglePause() {
    const scene = phaserGame.scene.scenes[0];
    const isPaused = scene.physics.world.isPaused;
    scene.physics.world.isPaused = !isPaused;
    document.getElementById('p-btn').innerText = isPaused ? "PAUSE" : "RESUME";
}

function updateScoreboard(newName, newScore) {
    let history = JSON.parse(localStorage.getItem('specOpsScores') || '[]');
    history.unshift({ name: newName, score: newScore });
    if (history.length > 5) history = history.slice(0, 5);
    localStorage.setItem('specOpsScores', JSON.stringify(history));
    
    const listElement = document.getElementById('history-list');
    listElement.innerHTML = history.map(entry => 
        `<div class="history-item"><span>${entry.name}</span> <span>${entry.score}</span></div>`
    ).join('');
}

function endGame() {
    gameActive = false;
    const name = document.getElementById('id-display').innerText;
    document.getElementById('hud').style.display = 'none';
    fireButton.setVisible(false);
    document.getElementById('death-interface').style.display = 'flex';
    document.getElementById('rank-title').innerText = score > 3000 ? "RANK: APEX" : "RANK: RECRUIT";
    document.getElementById('final-stats').innerText = `SCORE: ${score}`;
    
    updateScoreboard(name, score);
    phaserGame.scene.scenes[0].physics.world.pause();
}
</script>
</body>
</html>
