<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Spec-Ops: Tactical Titles - Pro Edition</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Courier New', monospace; cursor: crosshair; }
        .overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: rgba(0, 15, 0, 0.98); z-index: 100; color: #00ff41; text-align: center;
        }
        #hud {
            position: absolute; top: 20px; left: 20px;
            color: #00ff41; pointer-events: none; z-index: 10; display: none;
        }
        .input-group { margin: 15px 0; }
        input[type="text"] {
            background: rgba(0, 255, 65, 0.1); border: 2px solid #00ff41;
            color: #00ff41; padding: 10px; font-family: 'Courier New', monospace;
            font-size: 20px; text-align: center; outline: none; width: 250px;
        }
        .scoreboard {
            margin-top: 20px; border: 1px solid rgba(0, 255, 65, 0.3);
            padding: 15px; width: 450px; background: rgba(0, 20, 0, 0.5);
        }
        .score-row { display: flex; justify-content: space-between; font-size: 13px; margin: 5px 0; border-bottom: 1px solid rgba(0,255,65,0.1); }
        .btn {
            background: none; border: 2px solid #00ff41; color: #00ff41;
            padding: 15px 40px; font-size: 24px; cursor: pointer;
            font-family: 'Courier New', monospace; font-weight: bold; margin-top: 15px;
        }
        .btn:hover { background: #00ff41; color: #000; box-shadow: 0 0 20px #00ff41; }
        #rank-title { font-size: 28px; color: #ffcc00; margin: 10px 0; text-shadow: 0 0 10px #ffcc00; }
        #scanlines {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%);
            background-size: 100% 4px; z-index: 200; pointer-events: none;
        }
    </style>
</head>
<body oncontextmenu="return false;">

    <div id="scanlines"></div>

    <div id="start-interface" class="overlay">
        <h1 style="letter-spacing: 5px;">SPEC-OPS: ELITE</h1>
        <div class="input-group">
            <label style="display: block; margin-bottom: 10px;">OPERATIVE ID:</label>
            <input type="text" id="username" placeholder="CALLSIGN" maxlength="12">
        </div>
        <button class="btn" onclick="startGame()">INITIALIZE SYSTEM</button>
        
        <div class="scoreboard">
            <div style="text-decoration: underline; margin-bottom: 10px;">PREVIOUS DEPLOYMENTS</div>
            <div id="start-scores"></div>
        </div>
    </div>

    <div id="death-interface" class="overlay" style="display: none;">
        <h1 style="color: #ff4444; margin-bottom: 0;">OPERATIVE KIA</h1>
        <div id="rank-title">TITLE: RANKING...</div>
        <p id="final-stats" style="margin-top: 0;"></p>
        <button class="btn" onclick="location.reload()">REDEPLOY</button>
    </div>

    <div id="hud">
        <div class="stat">ID: <span id="id-display"></span></div>
        <div class="stat">LIVES: <span id="lives-display">❤️❤️❤️</span></div>
        <div class="stat">SCORE: <span id="score-display">00000</span></div>
    </div>

<script>
let gameActive = false, score = 0, lives = 3, threatLevel = 1;
const phaserConfig = {
    type: Phaser.CANVAS, width: window.innerWidth, height: window.innerHeight,
    physics: { default: 'arcade' }, scene: { preload, create, update }
};

const phaserGame = new Phaser.Game(phaserConfig);
let player, gun, enemies, bullets, keys, audioCtx;

// --- Synthetic Audio Engine ---
function playSynthSound(type) {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain);
    gain.connect(audioCtx.destination);

    if (type === 'fire') {
        osc.type = 'square';
        osc.frequency.setValueAtTime(880, audioCtx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(110, audioCtx.currentTime + 0.1);
        gain.gain.setValueAtTime(0.05, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
        osc.start(); osc.stop(audioCtx.currentTime + 0.1);
    } else if (type === 'hit') {
        osc.type = 'sawtooth';
        osc.frequency.setValueAtTime(150, audioCtx.currentTime);
        osc.frequency.linearRampToValueAtTime(40, audioCtx.currentTime + 0.2);
        gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
        gain.gain.linearRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
        osc.start(); osc.stop(audioCtx.currentTime + 0.2);
    }
}

function startBGM() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    const lfo = audioCtx.createOscillator();
    const lfoGain = audioCtx.createGain();

    osc.type = 'sine';
    osc.frequency.setValueAtTime(55, audioCtx.currentTime); // Low A
    
    lfo.frequency.setValueAtTime(0.5, audioCtx.currentTime); // Slow pulse
    lfoGain.gain.setValueAtTime(5, audioCtx.currentTime);
    
    lfo.connect(lfoGain);
    lfoGain.connect(osc.frequency);
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    
    gain.gain.setValueAtTime(0.03, audioCtx.currentTime);
    osc.start();
    lfo.start();
}

function getRankTitle(s) {
    if (s >= 5000) return "APEX PREDATOR";
    if (s >= 2000) return "ELITE VANGUARD";
    return "GREEN RECRUIT";
}

function renderScores() {
    const history = JSON.parse(localStorage.getItem('specOpsScores') || '[]');
    const html = history.map(s => `
        <div class="score-row">
            <span>${s.name}</span>
            <span style="color: #ffcc00;">[${s.title}]</span>
            <span>${s.score}</span>
        </div>`).join('');
    document.getElementById('start-scores').innerHTML = html || "NO DATA FOUND";
}
renderScores();

function preload() {
    let g = this.make.graphics({ x: 0, y: 0, add: false });
    g.lineStyle(1, 0x00ff41, 0.1).strokeRect(0, 0, 64, 64);
    g.generateTexture('grid', 64, 64);
    g.clear().fillStyle(0x00ff41).fillRect(0, 0, 20, 20);
    g.generateTexture('p', 20, 20);
    g.clear().fillStyle(0x00ff41).fillRect(0, 0, 18, 6);
    g.generateTexture('g', 18, 6);
    g.clear().fillStyle(0xff4444).fillRect(0, 0, 22, 22);
    g.generateTexture('e', 22, 22);
    g.clear().fillStyle(0xffff00).fillRect(0, 0, 12, 3);
    g.generateTexture('b', 12, 3);
}

function create() {
    this.add.tileSprite(0,0,5000,5000,'grid').setOrigin(0);
    player = this.physics.add.sprite(window.innerWidth/2, window.innerHeight/2, 'p').setVisible(false);
    
    // MOVEMENT FRICTION: High drag and acceleration
    player.setDamping(true);
    player.setDrag(0.05); 
    player.setMaxVelocity(400);
    player.setCollideWorldBounds(true);

    gun = this.add.image(0,0,'g').setOrigin(0, 0.5).setVisible(false);
    bullets = this.physics.add.group({ defaultKey: 'b', maxSize: 500 });
    enemies = this.physics.add.group();
    keys = this.input.keyboard.addKeys('W,A,S,D');

    this.physics.add.overlap(bullets, enemies, (b, e) => {
        b.disableBody(true, true);
        e.destroy();
        playSynthSound('hit');
        score += 100;
        document.getElementById('score-display').innerText = score.toString().padStart(5, '0');
        if(score % 500 === 0) threatLevel++;
    });

    this.physics.add.collider(player, enemies, (p, e) => {
        e.destroy(); 
        lives--;
        this.cameras.main.shake(200, 0.02);
        playSynthSound('hit');
        document.getElementById('lives-display').innerText = "❤️".repeat(lives) || "KIA";
        if (lives <= 0) endGame();
    });
    this.physics.world.pause();
}

function update(time) {
    if (!gameActive) return;

    // Movement with Acceleration
    const accel = 2000;
    if (keys.W.isDown) player.setAccelerationY(-accel);
    else if (keys.S.isDown) player.setAccelerationY(accel);
    else player.setAccelerationY(0);

    if (keys.A.isDown) player.setAccelerationX(-accel);
    else if (keys.D.isDown) player.setAccelerationX(accel);
    else player.setAccelerationX(0);

    let angle = Phaser.Math.Angle.Between(player.x, player.y, this.input.x, this.input.y);
    player.setRotation(angle);
    gun.setPosition(player.x, player.y).setRotation(angle);

    if (this.input.activePointer.isDown && time > (this.lastFired || 0)) {
        let b = bullets.get(player.x, player.y);
        if (b) {
            b.setActive(true).setVisible(true).body.reset(player.x, player.y);
            b.setRotation(angle);
            this.physics.velocityFromRotation(angle, 1800, b.body.velocity);
            this.lastFired = time + 80;
            playSynthSound('fire');
        }
    }

    bullets.getChildren().forEach(b => {
        if (b.active && (b.x<0 || b.x>window.innerWidth || b.y<0 || b.y>window.innerHeight)) b.disableBody(true,true);
    });

    if (enemies.countActive() < (6 + threatLevel)) {
        let x = Phaser.Math.Between(0, window.innerWidth), y = Phaser.Math.Between(0, window.innerHeight);
        if (Phaser.Math.Distance.Between(x, y, player.x, player.y) > 400) enemies.create(x, y, 'e');
    }
    enemies.getChildren().forEach(e => this.physics.moveToObject(e, player, 150 + (threatLevel * 15)));
}

function startGame() {
    const name = document.getElementById('username').value || "OPERATIVE";
    document.getElementById('id-display').innerText = name.toUpperCase();
    gameActive = true;
    document.getElementById('start-interface').style.display = 'none';
    document.getElementById('hud').style.display = 'block';
    player.setVisible(true); gun.setVisible(true);
    phaserGame.scene.scenes[0].physics.world.resume();
    startBGM();
}

function endGame() {
    gameActive = false;
    const name = document.getElementById('id-display').innerText;
    const titleAchieved = getRankTitle(score);
    document.getElementById('hud').style.display = 'none';
    document.getElementById('death-interface').style.display = 'flex';
    document.getElementById('rank-title').innerText = `RANK: ${titleAchieved}`;
    document.getElementById('final-stats').innerText = `ID: ${name} | SCORE: ${score}`;
    phaserGame.scene.scenes[0].physics.world.pause();
}
</script>
</body>
</html>
